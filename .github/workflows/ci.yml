name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: basedcollective
          POSTGRES_PASSWORD: basedcollective
          POSTGRES_DB: basedcollective
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://basedcollective:basedcollective@localhost:5432/basedcollective
      JWT_SECRET: ci-test-secret
      FRONTEND_URL: http://localhost:3000
      WORLDCOIN_MOCK: 'true'

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - run: npm ci
      - run: npx prisma migrate deploy --schema apps/api/prisma/schema.prisma
      - run: npm run type-check
      - run: npm run lint
      - run: npm run test
      - run: npm run build
